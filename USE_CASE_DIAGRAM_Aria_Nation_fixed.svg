<text class="ts" x="392" y="438" text-anchor="middle" fill="#aaa">— Pembayaran —</text>
<text class="ts" x="392" y="618" text-anchor="middle" fill="#aaa">— Custom Design / Sablon —</text>
<text class="ts" x="392" y="808" text-anchor="middle" fill="#aaa">— Tracking &amp; Riwayat —</text>
<text class="ts" x="392" y="958" text-anchor="middle" fill="#aaa">— Program Loyalitas —</text>
<text class="ts" x="392" y="1098" text-anchor="middle" fill="#aaa">— Manajemen Admin —</text>
<text class="ts" x="392" y="1228" text-anchor="middle" fill="#aaa">— Design Staff —</text>
