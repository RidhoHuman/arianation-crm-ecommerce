<svg width="100%" viewBox="0 0 680 1420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Use Case Diagram Arianation CRM &amp; E-Commerce System</title>
<desc>Use case diagram lengkap sistem Arianation meliputi Customer, Admin, Design Staff, Owner, dan Payment Gateway</desc>
<defs>
<style>
  text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
  .th { font-size: 12px; font-weight: bold; fill: #1a1a1a; }
  .ts { font-size: 11px; fill: #555; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- System Boundary -->
<rect x="120" y="10" width="545" height="1395" rx="16" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="8,4"/>
<text class="ts" x="392" y="30" text-anchor="middle" fill="#888">Arianation CRM &amp; E-Commerce System</text>

<!-- Section Labels -->
